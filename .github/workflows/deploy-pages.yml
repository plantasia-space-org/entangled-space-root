name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      VITE_BASE_PATH: /
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Verify forms base URL
        run: |
          if [ -z "${{ vars.VITE_FORMS_API_BASE_URL }}" ]; then
            echo "VITE_FORMS_API_BASE_URL is empty"
            exit 1
          fi
          echo "VITE_FORMS_API_BASE_URL is configured"

      - name: Write build environment
        run: |
          echo "VITE_FORMS_API_BASE_URL=${{ vars.VITE_FORMS_API_BASE_URL }}" > .env.production
          echo "VITE_BASE_PATH=/" >> .env.production

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
